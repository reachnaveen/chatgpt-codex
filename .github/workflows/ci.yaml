name: CI
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Build and test
        run: mvn -B verify
      - name: Run OWASP ZAP Baseline DAST
        uses: zaproxy/action-baseline@v0.9.0
        with:
          target: 'http://example.com'
